version: 0.2
phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - nohup /usr/local/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://127.0.0.1:2375 --storage-driver=overlay2 &
      - timeout 15 sh -c "until docker info; do echo .; sleep 1; done"
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

  pre_build:
    commands:
      - java -version
      - echo Logging in to Amazon ECR....
      - aws --version
      - aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 085430451857.dkr.ecr.eu-west-1.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=$BRANCH}
      - echo $IMAGE_TAG
      - REPOSITORY_URI=$ECR_URI
      - ls -la $CODEBUILD_SRC_DIR

  build:
    commands:
      - echo Build started on `date`
      - mvn clean package -DskipTests
      - echo Building Docker image using Docker CLI...
      - docker build -t $CONTAINER_NAME:latest .
      - echo Scanning image with Trivy...
      - trivy image --severity CRITICAL,HIGH --exit-code 1 --no-progress $CONTAINER_NAME:latest

  post_build:
    commands:
      - echo Tagging Docker images...
      - docker tag $CONTAINER_NAME:latest $REPOSITORY_URI:$BRANCH
      - docker tag $CONTAINER_NAME:latest $REPOSITORY_URI:$IMAGE_TAG
      - echo Pushing Docker images to ECR...
      - docker push $REPOSITORY_URI:$BRANCH
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Writing image tag for deploy stage..."
      - echo $IMAGE_TAG > image_tag.txt
      - echo "Rewriting image tag in petclinic-deployment.yaml..."
      - sed -i "s|spring-petclinic:main|spring-petclinic:$IMAGE_TAG|g" petclinic-deployment.yaml
      - cat petclinic-deployment.yaml | grep image:

artifacts:
  files:
    - image_tag.txt
    - petclinic-deployment.yaml

cache:
  paths:
    - '/root/.m2/**/*'
    - '/root/.cache/pip'